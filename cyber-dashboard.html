<!DOCTYPE html>
<html>
<head>

<title>Shield Cyber Investigation Dashboard</title>

<style>

body{
background:black;
font-family:monospace;
color:#00ff9c;
text-align:center;
}

h1{
margin-top:30px;
text-shadow:0 0 10px #00ff9c;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:40px;
}

.card{

background:#0a0a0a;
border:1px solid #00ff9c;
width:260px;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px #00ff9c;
}

.card h3{
margin-bottom:10px;
}

input{

width:90%;
padding:8px;
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
}

button{

margin-top:10px;
padding:8px 15px;
background:#00ff9c;
border:none;
cursor:pointer;
font-weight:bold;
}

.result{

margin-top:10px;
font-size:14px;
}

</style>

<script>

function phoneLookup(){

var num=document.getElementById("phone").value

document.getElementById("phoneResult").innerHTML=
"Scanning phone intelligence for "+num+" ..."
}

function emailLookup(){

var email=document.getElementById("email").value

document.getElementById("emailResult").innerHTML=
"Checking breach database for "+email+" ..."
}

function ipTrack(){

var ip=document.getElementById("ip").value

document.getElementById("ipResult").innerHTML=
"Tracing IP location for "+ip+" ..."
}

function usernameScan(){

var user=document.getElementById("username").value

document.getElementById("userResult").innerHTML=
"Searching social media footprint for "+user+" ..."
}

function darkWebScan(){

var target=document.getElementById("dark").value

document.getElementById("darkResult").innerHTML=
"Scanning dark web mentions for "+target+" ..."
}

</script>

</head>

<body>

<h1>🛡 SHIELD CYBER FORENSIC INVESTIGATION</h1>

<p>Cyber Intelligence Dashboard</p>

<div class="container">

<div class="card">

<h3>📱 Phone Intelligence</h3>

<input id="phone" placeholder="Enter phone number">

<br>

<button onclick="phoneLookup()">Scan</button>

<div id="phoneResult" class="result"></div>

</div>

<div class="card">

<h3>📧 Email Intelligence</h3>

<input id="email" placeholder="Enter email">

<br>

<button onclick="emailLookup()">Scan</button>

<div id="emailResult" class="result"></div>

</div>

<div class="card">

<h3>🌐 IP Tracker</h3>

<input id="ip" placeholder="Enter IP address">

<br>

<button onclick="ipTrack()">Trace</button>

<div id="ipResult" class="result"></div>

</div>

<div class="card">

<h3>👤 Username OSINT</h3>

<input id="username" placeholder="Enter username">

<br>

<button onclick="usernameScan()">Scan</button>

<div id="userResult" class="result"></div>

</div>

<div class="card">

<h3>🕵 Dark Web Scan</h3>

<input id="dark" placeholder="Name / Email / Phone">

<br>

<button onclick="darkWebScan()">Scan</button>

<div id="darkResult" class="result"></div>

</div>

</div>

</body>

</html>
